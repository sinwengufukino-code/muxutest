<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FAF6EF;--gold:#C8A96E;--dark:#1A1612;
  --gold-light:#E8D5B0;--gold-dark:#9A7B45;
  --warm-gray:#8C7E6A;--soft-brown:#3D3229;
}
body{
  font-family:"Noto Serif SC","Songti SC","STSong","SimSun",serif;
  background:var(--cream);min-height:100vh;color:var(--dark);
  display:flex;justify-content:center;padding:0;
  -webkit-font-smoothing:antialiased;
}
.stage{max-width:480px;width:100%;min-height:100vh;position:relative;overflow:hidden}

/* ===== 开屏 ===== */
.welcome{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 24px;text-align:center;
  background:linear-gradient(180deg,var(--cream) 0%,#F5EDE0 100%);
  position:relative;
}
.welcome::before{
  content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:1px;height:80px;background:linear-gradient(180deg,transparent,var(--gold));
}
.w-brand{
  font-family:"Cormorant Garamond",serif;font-size:11px;
  letter-spacing:8px;color:var(--gold-dark);margin-bottom:6px;
  text-transform:uppercase;font-weight:300;
}
.w-logo{
  font-size:36px;letter-spacing:12px;color:var(--dark);
  font-weight:300;margin:12px 0 8px;
}
.w-sub{
  font-size:13px;color:var(--gold-dark);letter-spacing:4px;
  margin-bottom:40px;font-weight:300;
}
.w-title{
  font-size:22px;color:var(--dark);letter-spacing:3px;
  font-weight:400;line-height:1.8;margin-bottom:8px;
}
.w-desc{
  font-size:14px;color:var(--warm-gray);line-height:2;
  letter-spacing:1px;margin-bottom:50px;max-width:320px;
}
.w-start{
  background:transparent;border:1px solid var(--gold);
  color:var(--dark);padding:14px 48px;font-family:inherit;
  font-size:15px;letter-spacing:6px;cursor:pointer;
  transition:all .4s ease;position:relative;
}
.w-start:hover{background:var(--gold);color:var(--cream)}
.w-start::before,.w-start::after{
  content:"";position:absolute;width:12px;height:12px;
  border-color:var(--gold);border-style:solid;
  transition:all .4s;
}
.w-start::before{top:-4px;left:-4px;border-width:1px 0 0 1px}
.w-start::after{bottom:-4px;right:-4px;border-width:0 1px 1px 0}

/* ===== 答题 ===== */
.quiz-wrap{
  min-height:100vh;padding:0 24px;display:flex;flex-direction:column;
  background:var(--cream);
}
.q-progress{
  padding:30px 0 20px;display:flex;align-items:center;gap:12px;
}
.q-bar{flex:1;height:2px;background:var(--gold-light);position:relative;overflow:hidden}
.q-bar-fill{height:100%;background:var(--gold);transition:width .5s ease;width:0}
.q-num{font-size:12px;color:var(--warm-gray);letter-spacing:2px;font-family:"Cormorant Garamond",serif;font-size:14px}
.q-card{flex:1;display:flex;flex-direction:column;justify-content:center;padding-bottom:40px}
.q-dim{
  font-size:11px;color:var(--gold-dark);letter-spacing:6px;
  margin-bottom:16px;font-weight:300;
}
.q-text{
  font-size:19px;color:var(--dark);line-height:1.8;
  letter-spacing:2px;margin-bottom:36px;font-weight:400;
}
.q-opts{display:flex;flex-direction:column;gap:12px}
.q-opt{
  background:transparent;border:1px solid var(--gold-light);
  color:var(--dark);padding:16px 20px;text-align:left;
  font-family:inherit;font-size:15px;letter-spacing:1px;
  cursor:pointer;transition:all .35s ease;line-height:1.6;
  position:relative;overflow:hidden;
}
.q-opt::before{
  content:"";position:absolute;inset:0;
  background:var(--gold);opacity:0;transition:opacity .35s;z-index:0;
}
.q-opt span{position:relative;z-index:1}
.q-opt:hover{border-color:var(--gold)}
.q-opt:hover::before{opacity:.08}
.q-opt.selected{border-color:var(--gold);background:rgba(200,169,110,.12)}
.q-opt.selected::before{opacity:.12}

/* fade transition */
.q-card{opacity:1;transform:translateY(0);transition:opacity .4s,transform .4s}
.q-card.exit{opacity:0;transform:translateY(-20px)}
.q-card.enter{opacity:0;transform:translateY(20px)}

/* ===== 分析中 ===== */
.analyzing{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:40px;
  background:var(--cream);
}
.ripple-box{width:140px;height:140px;position:relative;margin-bottom:40px}
.ripple{
  position:absolute;inset:0;border:1px solid var(--gold);
  border-radius:50%;animation:ripple 2.4s ease-out infinite;
  opacity:0;
}
.ripple:nth-child(2){animation-delay:.8s}
.ripple:nth-child(3){animation-delay:1.6s}
@keyframes ripple{0%{transform:scale(.4);opacity:.8}100%{transform:scale(1.2);opacity:0}}
.ripple-center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:8px;height:8px;background:var(--gold);border-radius:50%;
}
.ana-text{
  font-size:14px;color:var(--warm-gray);letter-spacing:4px;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* ===== 结果卡片 ===== */
.result-wrap{padding:24px 16px 40px;background:var(--cream)}
.card{
  background:var(--cream);border:1px solid var(--gold);
  position:relative;overflow:hidden;
  box-shadow:0 4px 30px rgba(26,22,18,.08);
}
.card::before{
  content:"";position:absolute;inset:6px;
  border:0.5px solid rgba(200,169,110,.4);pointer-events:none;z-index:1;
}
.card-header{
  text-align:center;padding:32px 20px 24px;
  border-bottom:1px solid rgba(200,169,110,.3);
  position:relative;
}
.card-header::after{
  content:"";position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
  width:40px;height:1px;background:var(--gold);
}
.ch-brand{
  font-family:"Cormorant Garamond",serif;font-size:10px;
  letter-spacing:6px;color:var(--gold-dark);margin-bottom:4px;
  text-transform:uppercase;font-weight:300;
}
.ch-type-en{
  font-family:"Cormorant Garamond",serif;font-size:11px;
  letter-spacing:3px;color:var(--warm-gray);margin-bottom:8px;font-weight:300;
}
.ch-name{
  font-size:34px;letter-spacing:10px;color:var(--dark);
  font-weight:300;margin-bottom:4px;
}
.ch-subtitle{
  font-size:13px;color:var(--gold-dark);letter-spacing:3px;
  font-weight:300;margin-bottom:8px;
}
.ch-tag{
  font-size:14px;color:var(--warm-gray);letter-spacing:2px;
  font-style:italic;font-weight:300;line-height:1.8;
}

/* 四维 */
.dims{
  display:grid;grid-template-columns:repeat(4,1fr);
  border-bottom:1px solid rgba(200,169,110,.3);
}
.dim{
  padding:14px 6px;text-align:center;
  border-right:1px solid rgba(200,169,110,.2);
}
.dim:last-child{border-right:none}
.dim-pair{font-size:11px;color:var(--warm-gray);letter-spacing:2px;margin-bottom:4px}
.dim-val{font-size:18px;color:var(--dark);letter-spacing:3px;margin-bottom:2px}
.dim-pct{font-size:11px;color:var(--gold-dark);margin-bottom:4px}
.dim-bar{height:2px;background:rgba(200,169,110,.2);margin:0 8px;position:relative}
.dim-bar-fill{height:100%;background:var(--gold);position:absolute;top:0;left:0}

/* 内容区 */
.card-body{padding:24px 22px}
.sec{
  padding:14px 0;
  border-bottom:1px solid rgba(200,169,110,.15);
}
.sec:last-child{border-bottom:none}
.sec-label{
  font-size:12px;color:var(--gold-dark);letter-spacing:4px;
  margin-bottom:8px;font-weight:400;
}
.sec-label::before{
  content:"";display:inline-block;width:12px;height:1px;
  background:var(--gold);margin-right:8px;vertical-align:middle;
}
.sec-content{
  font-size:14px;color:var(--dark);line-height:2;
  letter-spacing:.5px;font-weight:300;
}

/* 课程推荐 */
.course-box{
  background:rgba(200,169,110,.08);
  border:1px solid rgba(200,169,110,.25);
  padding:18px 20px;margin-top:4px;
}
.course-track{
  font-size:13px;color:var(--gold-dark);letter-spacing:3px;
  margin-bottom:6px;font-weight:400;
}
.course-desc{
  font-size:13px;color:var(--dark);line-height:1.9;
  letter-spacing:.5px;font-weight:300;
}

/* 底部 */
.card-footer{
  text-align:center;padding:20px;
  border-top:1px solid rgba(200,169,110,.3);
  position:relative;
}
.card-footer::before{
  content:"";position:absolute;top:-1px;left:50%;transform:translateX(-50%);
  width:40px;height:1px;background:var(--gold);
}
.cf-logo{font-size:16px;color:var(--dark);letter-spacing:6px;margin-bottom:4px}
.cf-en{
  font-family:"Cormorant Garamond",serif;font-size:10px;
  letter-spacing:4px;color:var(--warm-gray);margin-bottom:8px;
  text-transform:uppercase;
}
.cf-addr{font-size:11px;color:var(--warm-gray);letter-spacing:1px;line-height:1.8}
.cf-cta{
  display:inline-block;margin-top:10px;padding:8px 20px;
  border:1px solid var(--gold);font-size:12px;
  color:var(--gold-dark);letter-spacing:3px;
}

/* 操作按钮 */
.actions{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  margin-top:16px;
}
.act-btn{
  padding:14px;background:transparent;border:1px solid var(--gold);
  color:var(--dark);font-family:inherit;font-size:14px;
  letter-spacing:4px;cursor:pointer;transition:all .3s;
}
.act-btn:hover{background:var(--gold);color:var(--cream)}
.act-btn:disabled{opacity:.4;cursor:wait}
.act-btn.primary{background:var(--gold);color:var(--cream)}
.act-btn.primary:hover{background:var(--gold-dark)}

/* 保存提示 */
.save-hint{
  text-align:center;font-size:12px;color:var(--warm-gray);
  margin-top:16px;letter-spacing:1px;line-height:1.8;
}
.save-preview{margin-top:16px;text-align:center}
.save-preview img{max-width:100%;border:1px solid var(--gold-light);box-shadow:0 2px 16px rgba(0,0,0,.08)}

/* 隐藏 */
.hidden{display:none!important}

/* 移动端适配 */
@media(max-width:380px){
  .ch-name{font-size:28px;letter-spacing:8px}
  .q-text{font-size:17px}
  .q-opt{padding:14px 16px;font-size:14px}
}
</style></head>

// ============================================================
//  流程控制
// ============================================================
let curQ = 0;
const answers = {};

function startQuiz() {
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('quizWrap').classList.remove('hidden');
  renderQuestion(0);
}

function renderQuestion(idx) {
  const q = quiz[idx];
  const card = document.getElementById('qCard');
  card.className = 'q-card enter';

  // 进度条
  document.getElementById('qBarFill').style.width = ((idx) / quiz.length * 100) + '%';
  document.getElementById('qNum').textContent = `${idx + 1} / ${quiz.length}`;

  card.innerHTML = `
    <div class="q-dim">${q.dim}</div>
    <div class="q-text">${q.q}</div>
    <div class="q-opts">
      ${q.o.map((o, i) => `<button class="q-opt" onclick="pickOpt(${idx},${i})"><span>${o.t}</span></button>`).join('')}
    </div>
  `;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => { card.className = 'q-card'; });
  });
}

function pickOpt(qIdx, oIdx) {
  const q = quiz[qIdx];
  const o = q.o[oIdx];
  answers[qIdx] = { d: o.d, w: o.w };

  // 高亮选中
  const opts = document.querySelectorAll('.q-opt');
  opts.forEach((el, i) => el.classList.toggle('selected', i === oIdx));

  // 延迟切换
  setTimeout(() => {
    if (qIdx < quiz.length - 1) {
      const card = document.getElementById('qCard');
      card.className = 'q-card exit';
      setTimeout(() => {
        curQ = qIdx + 1;
        renderQuestion(curQ);
      }, 350);
    } else {
      // 全部答完
      document.getElementById('qBarFill').style.width = '100%';
      setTimeout(showAnalyzing, 400);
    }
  }, 500);
}

function showAnalyzing() {
  document.getElementById('quizWrap').classList.add('hidden');
  document.getElementById('analyzing').classList.remove('hidden');

  const msgs = [
    '正 在 感 知 你 的 身 体 ...',
    '读 取 你 的 力 量 与 柔 韧 ...',
    '描 绘 你 的 身 体 画 像 ...',
  ];
  let i = 0;
  const el = document.getElementById('anaText');
  const t = setInterval(() => {
    i++;
    if (i < msgs.length) { el.textContent = msgs[i]; }
    else { clearInterval(t); showResult(); }
  }, 1400);
}

// ============================================================
//  计算结果
// ============================================================
function showResult() {
  // 4 维度：每个维度由 2 题决定
  const dimMap = [0, 0, 1, 1, 2, 2, 3, 3]; // 题目 -> 维度
  const scores = [{}, {}, {}, {}];

  Object.entries(answers).forEach(([i, v]) => {
    const dim = dimMap[parseInt(i)];
    scores[dim][v.d] = (scores[dim][v.d] || 0) + v.w;
  });

  const result = scores.map((s, i) => {
    const [a, b] = dimNames[i];
    const av = s[a] || 0, bv = s[b] || 0;
    const total = av + bv || 1;
    const pa = Math.round(av / total * 100);
    return {
      pick: pa >= 50 ? a : b,
      other: pa >= 50 ? b : a,
      pct: pa >= 50 ? pa : 100 - pa
    };
  });

  const code = result.map(r => r.pick).join('');
  const t = types[code] || types['柔觉稳修'];

  // 渲染卡片
  document.getElementById('card').innerHTML = `
    <div class="card-header">
      <div class="ch-brand">MUXU PILATES · BODY PORTRAIT</div>
      <div class="ch-type-en">${t.en}</div>
      <div class="ch-name">${t.name}</div>
      <div class="ch-subtitle">${t.sub}</div>
      <div class="ch-tag">「 ${t.tag} 」</div>
    </div>
    <div class="dims">
      ${result.map((r, i) => `
        <div class="dim">
          <div class="dim-pair">${dimNames[i][0]} / ${dimNames[i][1]}</div>
          <div class="dim-val">${r.pick}</div>
          <div class="dim-pct">${r.pct}%</div>
          <div class="dim-bar"><div class="dim-bar-fill" style="width:${r.pct}%"></div></div>
        </div>
      `).join('')}
    </div>
    <div class="card-body">
      <div class="sec">
        <div class="sec-label">你 的 身 体 语 言</div>
        <div class="sec-content">${t.desc}</div>
      </div>
      <div class="sec">
        <div class="sec-label">推 荐 课 程 方 向</div>
        <div class="course-box">
          <div class="course-track">${t.course}</div>
          <div class="course-desc">${t.courseDetail}</div>
        </div>
      </div>
      <div class="sec">
        <div class="sec-label">每 日 身 体 小 贴 士</div>
        <div class="sec-content">${t.tip}</div>
      </div>
    </div>
    <div class="card-footer">
      <div class="cf-logo">沐 煦</div>
      <div class="cf-en">MUXU PILATES</div>
      <div class="cf-addr">苏州工业园区 · 诚品居所<br>月廊街8号 2幢 1509</div>
      <div class="cf-cta">私信预约 · 体验价 ¥128</div>
    </div>
  `;

  document.getElementById('analyzing').classList.add('hidden');
  document.getElementById('resultWrap').classList.remove('hidden');

  // 保存图片
  document.getElementById('saveBtn').onclick = async () => {
    const btn = document.getElementById('saveBtn');
    btn.textContent = '生 成 中 ...'; btn.disabled = true;
    try {
      const card = document.getElementById('card');
      const canvas = await html2canvas(card, {
        scale: 3,
        backgroundColor: '#FAF6EF',
        useCORS: true,
        logging: false
      });
      const url = canvas.toDataURL('image/png');
      document.getElementById('saveImg').src = url;
      document.getElementById('saveArea').classList.remove('hidden');
      // PC 自动下载
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      if (!isMobile) {
        const link = document.createElement('a');
        link.download = `沐煦身体画像_${t.name}.png`;
        link.href = url;
        link.click();
      }
      document.getElementById('saveArea').scrollIntoView({ behavior: 'smooth', block: 'center' });
    } catch (e) {
      console.error(e);
      alert('生成失败，请尝试截图保存');
    }
    btn.textContent = '保 存 图 片'; btn.disabled = false;
  };
}
