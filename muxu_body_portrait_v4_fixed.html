<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>身体画像·沐煦版｜遇见你的身体能量</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#FAF6EF;--gold:#C8A96E;--dark:#1A1612;--gold-light:#E8D5B0;--gold-dark:#9A7B45;--warm-gray:#8C7E6A;--soft-brown:#3D3229;--accent:#B8544F;--night:#0F0E12}
body{font-family:"Noto Serif SC","Songti SC","STSong","SimSun",serif;background:var(--cream);min-height:100vh;color:var(--dark);display:flex;justify-content:center;padding:0;-webkit-font-smoothing:antialiased}
.stage{max-width:480px;width:100%;min-height:100vh;position:relative;overflow:hidden}

/* 开屏 */
.welcome{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;background:linear-gradient(180deg,var(--cream) 0%,#F5EDE0 100%);position:relative}
.welcome::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:1px;height:80px;background:linear-gradient(180deg,transparent,var(--gold))}
.w-brand{font-family:"Cormorant Garamond",serif;font-size:11px;letter-spacing:8px;color:var(--gold-dark);margin-bottom:6px;text-transform:uppercase;font-weight:300}
.w-logo{font-size:36px;letter-spacing:12px;color:var(--dark);font-weight:300;margin:12px 0 8px}
.w-sub{font-size:13px;color:var(--gold-dark);letter-spacing:4px;margin-bottom:40px;font-weight:300}
.w-title{font-size:22px;color:var(--dark);letter-spacing:3px;font-weight:400;line-height:1.8;margin-bottom:8px}
.w-desc{font-size:14px;color:var(--warm-gray);line-height:2;letter-spacing:1px;margin-bottom:50px;max-width:320px}
.w-start{background:transparent;border:1px solid var(--gold);color:var(--dark);padding:14px 48px;font-family:inherit;font-size:15px;letter-spacing:6px;cursor:pointer;transition:all .4s ease;position:relative}
.w-start:hover{background:var(--gold);color:var(--cream)}
.w-start::before,.w-start::after{content:"";position:absolute;width:12px;height:12px;border-color:var(--gold);border-style:solid;transition:all .4s}
.w-start::before{top:-4px;left:-4px;border-width:1px 0 0 1px}
.w-start::after{bottom:-4px;right:-4px;border-width:0 1px 1px 0}

/* 答题 */
.quiz-wrap{min-height:100vh;padding:0 24px;display:flex;flex-direction:column;background:var(--cream)}
.q-progress{padding:30px 0 20px;display:flex;align-items:center;gap:12px}
.q-bar{flex:1;height:2px;background:var(--gold-light);position:relative;overflow:hidden}
.q-bar-fill{height:100%;background:var(--gold);transition:width .5s ease;width:0}
.q-num{font-size:14px;color:var(--warm-gray);letter-spacing:2px;font-family:"Cormorant Garamond",serif}
.q-card{flex:1;display:flex;flex-direction:column;justify-content:center;padding-bottom:40px}
.q-dim{font-size:11px;color:var(--gold-dark);letter-spacing:6px;margin-bottom:16px;font-weight:300}
.q-text{font-size:19px;color:var(--dark);line-height:1.8;letter-spacing:2px;margin-bottom:36px;font-weight:400}
.q-opts{display:flex;flex-direction:column;gap:12px}
.q-opt{background:transparent;border:1px solid var(--gold-light);color:var(--dark);padding:16px 20px;text-align:left;font-family:inherit;font-size:15px;letter-spacing:1px;cursor:pointer;transition:all .35s ease;line-height:1.6;position:relative;overflow:hidden}
.q-opt::before{content:"";position:absolute;inset:0;background:var(--gold);opacity:0;transition:opacity .35s;z-index:0}
.q-opt span{position:relative;z-index:1}
.q-opt:hover{border-color:var(--gold)}.q-opt:hover::before{opacity:.08}
.q-opt.selected{border-color:var(--gold);background:rgba(200,169,110,.12)}.q-opt.selected::before{opacity:.12}
.q-card{opacity:1;transform:translateY(0);transition:opacity .4s,transform .4s}
.q-card.exit{opacity:0;transform:translateY(-20px)}.q-card.enter{opacity:0;transform:translateY(20px)}

/* 排序题 */
.rank-hint{font-size:12px;color:var(--warm-gray);letter-spacing:1px;margin-bottom:20px;line-height:1.8}
.rank-grid{display:flex;flex-direction:column;gap:10px}
.rank-item{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  border:1px solid var(--gold-light);cursor:pointer;transition:all .3s;
  font-size:15px;color:var(--dark);letter-spacing:1px;font-family:inherit;
  background:transparent;text-align:left;line-height:1.5;
}
.rank-item:hover{border-color:var(--gold)}
.rank-item.ranked{border-color:var(--gold);background:rgba(200,169,110,.1)}
.rank-badge{
  width:24px;height:24px;border-radius:50%;border:1px solid var(--gold-light);
  display:flex;align-items:center;justify-content:center;
  font-family:"Cormorant Garamond",serif;font-size:13px;color:var(--warm-gray);
  flex-shrink:0;transition:all .3s;
}
.rank-item.ranked .rank-badge{background:var(--gold);border-color:var(--gold);color:var(--cream)}
.rank-emoji{font-size:18px;flex-shrink:0}
.rank-label{flex:1}
.rank-submit{
  margin-top:20px;width:100%;padding:16px;background:var(--gold);border:1px solid var(--gold);
  color:var(--cream);font-family:inherit;font-size:15px;letter-spacing:6px;cursor:pointer;
  transition:all .3s;
}
.rank-submit:hover{background:var(--gold-dark)}
.rank-submit:disabled{opacity:.3;cursor:not-allowed}

/* 分析中 */
.analyzing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;background:var(--cream)}
.ripple-box{width:140px;height:140px;position:relative;margin-bottom:40px}
.ripple{position:absolute;inset:0;border:1px solid var(--gold);border-radius:50%;animation:ripple 2.4s ease-out infinite;opacity:0}
.ripple:nth-child(2){animation-delay:.8s}.ripple:nth-child(3){animation-delay:1.6s}
@keyframes ripple{0%{transform:scale(.4);opacity:.8}100%{transform:scale(1.2);opacity:0}}
.ripple-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;background:var(--gold);border-radius:50%}
.ana-text{font-size:14px;color:var(--warm-gray);letter-spacing:4px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* 结果卡 */
.result-wrap{padding:24px 16px 40px;background:var(--cream)}
.card{background:var(--cream);border:1px solid var(--gold);position:relative;overflow:hidden;box-shadow:0 4px 30px rgba(26,22,18,.08)}
.card::before{content:"";position:absolute;inset:6px;border:0.5px solid rgba(200,169,110,.4);pointer-events:none;z-index:1}
.card-header{text-align:center;padding:32px 20px 24px;border-bottom:1px solid rgba(200,169,110,.3);position:relative}
.card-header::after{content:"";position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:40px;height:1px;background:var(--gold)}
.ch-brand{font-family:"Cormorant Garamond",serif;font-size:10px;letter-spacing:6px;color:var(--gold-dark);margin-bottom:4px;text-transform:uppercase;font-weight:300}
.ch-type-en{font-family:"Cormorant Garamond",serif;font-size:11px;letter-spacing:3px;color:var(--warm-gray);margin-bottom:8px;font-weight:300}
.ch-emoji{font-size:32px;margin-bottom:4px}
.ch-name{font-size:34px;letter-spacing:10px;color:var(--dark);font-weight:300;margin-bottom:4px}
.ch-subtitle{font-size:13px;color:var(--gold-dark);letter-spacing:3px;font-weight:300;margin-bottom:6px}
.ch-energy{font-size:12px;color:var(--accent);letter-spacing:4px;font-weight:400;margin-bottom:10px}
.ch-tag{font-size:14px;color:var(--warm-gray);letter-spacing:2px;font-weight:300;line-height:1.8}
.vibe-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:12px}
.vibe-tag{display:inline-block;padding:4px 12px;background:rgba(200,169,110,.12);border:1px solid rgba(200,169,110,.3);font-size:11px;color:var(--gold-dark);letter-spacing:1.5px}

/* 星图 */
.starmap{position:relative;background:radial-gradient(ellipse at center,#1a1825 0%,var(--night) 100%);padding:30px 16px 24px;text-align:center;overflow:hidden;border-bottom:1px solid rgba(200,169,110,.3)}
.starmap canvas{display:block;margin:0 auto 16px;max-width:100%}
.star-rarity{position:relative;z-index:2}
.star-label{font-size:11px;color:rgba(200,169,110,.6);letter-spacing:4px;margin-bottom:6px}
.star-pct{font-family:"Cormorant Garamond",serif;font-size:56px;color:var(--gold);font-weight:300;line-height:1;margin-bottom:4px}.star-pct span{font-size:28px}
.star-sub{font-size:12px;color:rgba(200,169,110,.7);letter-spacing:2px;margin-bottom:6px}
.star-talent{font-size:13px;color:var(--gold-light);letter-spacing:1.5px;line-height:1.8}
.star-talent em{font-style:normal;color:var(--gold);font-weight:600}

/* 雷达 */
.radar-section{padding:24px 16px;text-align:center;border-bottom:1px solid rgba(200,169,110,.3)}
.radar-label{font-size:12px;color:var(--gold-dark);letter-spacing:4px;margin-bottom:16px}
.radar-label::before,.radar-label::after{content:"";display:inline-block;width:20px;height:1px;background:var(--gold-light);vertical-align:middle;margin:0 10px}
.radar-svg{display:block;margin:0 auto;max-width:280px}

/* 内容 */
.card-body{padding:24px 22px}
.sec{padding:14px 0;border-bottom:1px solid rgba(200,169,110,.15)}.sec:last-child{border-bottom:none}
.sec-label{font-size:12px;color:var(--gold-dark);letter-spacing:4px;margin-bottom:8px;font-weight:400}
.sec-label::before{content:"";display:inline-block;width:12px;height:1px;background:var(--gold);margin-right:8px;vertical-align:middle}
.sec-content{font-size:14px;color:var(--dark);line-height:2;letter-spacing:.5px;font-weight:300}

/* 预言 */
.prophecy-box{background:linear-gradient(180deg,rgba(200,169,110,.06),rgba(200,169,110,.12));border:1px solid rgba(200,169,110,.25);padding:22px 20px;margin-top:4px;position:relative}
.prophecy-box::before{content:"✦";position:absolute;top:12px;right:16px;color:var(--gold-light);font-size:14px;opacity:.5}
.prophecy-title{font-size:12px;color:var(--gold-dark);letter-spacing:4px;margin-bottom:10px}
.prophecy-content{font-size:14px;color:var(--dark);line-height:2.2;letter-spacing:.5px;font-weight:300}

/* 优先级 */
.priority-box{margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
.pri-tag{padding:5px 14px;font-size:12px;letter-spacing:2px}
.pri-tag.t1{background:var(--gold);color:var(--cream)}
.pri-tag.t2{background:rgba(200,169,110,.2);color:var(--dark)}
.pri-tag.t3{background:rgba(200,169,110,.1);color:var(--warm-gray)}

/* 课程 */
.course-box{background:rgba(200,169,110,.08);border:1px solid rgba(200,169,110,.25);padding:18px 20px;margin-top:4px}
.course-track{font-size:13px;color:var(--gold-dark);letter-spacing:3px;margin-bottom:6px;font-weight:400}
.course-desc{font-size:13px;color:var(--dark);line-height:1.9;letter-spacing:.5px;font-weight:300}

/* 搭档 */
.match-box{background:rgba(184,84,79,.05);border:1px solid rgba(184,84,79,.2);padding:18px 20px;margin-top:4px;text-align:center}
.match-label{font-size:11px;color:var(--accent);letter-spacing:3px;margin-bottom:8px}
.match-names{font-size:16px;color:var(--dark);letter-spacing:3px;margin-bottom:6px}
.match-desc{font-size:12px;color:var(--warm-gray);line-height:1.8;letter-spacing:.5px}

/* 底部CTA */
.card-footer{text-align:center;padding:24px 20px;border-top:1px solid rgba(200,169,110,.3);position:relative}
.card-footer::before{content:"";position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:40px;height:1px;background:var(--gold)}
.cf-logo{font-size:16px;color:var(--dark);letter-spacing:6px;margin-bottom:4px}
.cf-en{font-family:"Cormorant Garamond",serif;font-size:10px;letter-spacing:4px;color:var(--warm-gray);margin-bottom:12px;text-transform:uppercase}
.cf-cta-main{display:inline-block;padding:10px 24px;border:1px solid var(--gold);font-size:13px;color:var(--dark);letter-spacing:3px;margin-bottom:8px}
.cf-cta-sub{font-size:13px;color:var(--warm-gray);letter-spacing:1px;line-height:2;font-weight:300}
.cf-price{font-size:11px;color:var(--gold-dark);letter-spacing:1px;margin-top:8px}
.cf-addr{font-size:11px;color:var(--warm-gray);letter-spacing:1px;line-height:1.8;margin-top:6px}

/* 裂变 */
.viral-section{margin-top:20px;background:var(--cream);border:1px solid var(--gold);padding:24px 20px;text-align:center;position:relative}
.viral-section::before{content:"";position:absolute;inset:6px;border:0.5px solid rgba(200,169,110,.4);pointer-events:none}
.viral-title{font-size:15px;color:var(--dark);letter-spacing:3px;margin-bottom:6px;font-weight:400}
.viral-sub{font-size:13px;color:var(--warm-gray);line-height:2;letter-spacing:1px;margin-bottom:16px}
.copy-box{background:rgba(200,169,110,.06);border:1px solid rgba(200,169,110,.25);padding:16px;margin-bottom:16px;text-align:left;font-size:13px;color:var(--dark);line-height:2;letter-spacing:.5px;max-height:200px;overflow-y:auto;white-space:pre-wrap}
.viral-btns{display:flex;flex-direction:column;gap:10px}
.v-btn{padding:14px;background:transparent;border:1px solid var(--gold);color:var(--dark);font-family:inherit;font-size:14px;letter-spacing:4px;cursor:pointer;transition:all .3s}
.v-btn:hover{background:var(--gold);color:var(--cream)}
.v-btn.primary{background:var(--gold);color:var(--cream)}.v-btn.primary:hover{background:var(--gold-dark)}

/* 操作 */
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.act-btn{padding:14px;background:transparent;border:1px solid var(--gold);color:var(--dark);font-family:inherit;font-size:14px;letter-spacing:4px;cursor:pointer;transition:all .3s}
.act-btn:hover{background:var(--gold);color:var(--cream)}
.act-btn:disabled{opacity:.4;cursor:wait}
.act-btn.primary{background:var(--gold);color:var(--cream)}.act-btn.primary:hover{background:var(--gold-dark)}
.save-hint{text-align:center;font-size:12px;color:var(--warm-gray);margin-top:16px;letter-spacing:1px;line-height:1.8}
.save-preview{margin-top:16px;text-align:center}
.save-preview img{max-width:100%;border:1px solid var(--gold-light);box-shadow:0 2px 16px rgba(0,0,0,.08)}
.hidden{display:none!important}
@media(max-width:380px){.ch-name{font-size:28px;letter-spacing:8px}.q-text{font-size:17px}.q-opt{padding:14px 16px;font-size:14px}.star-pct{font-size:44px}}
</style></head>
<body>
<div class="stage">

<div id="welcome" class="welcome">
  <div class="w-brand">MUXU PILATES</div>
  <div class="w-logo">沐 煦</div>
  <div class="w-sub">沐天地之气 · 煦生命之光</div>
  <div class="w-title">身体能量测试</div>
  <div class="w-desc">10道关于身体感知的小问题<br>解锁你的专属能量图谱<br>看看你是什么「练家子」体质</div>
  <button class="w-start" onclick="startQuiz()">开 始 测 试</button>
</div>

<div id="quizWrap" class="quiz-wrap hidden">
  <div class="q-progress"><div class="q-bar"><div class="q-bar-fill" id="qBarFill"></div></div><div class="q-num" id="qNum">1 / 10</div></div>
  <div class="q-card" id="qCard"></div>
</div>

<div id="analyzing" class="analyzing hidden">
  <div class="ripple-box"><div class="ripple"></div><div class="ripple"></div><div class="ripple"></div><div class="ripple-center"></div></div>
  <div class="ana-text" id="anaText">正 在 感 知 你 的 能 量 ...</div>
</div>

<div id="resultWrap" class="result-wrap hidden">
  <div class="card" id="card"></div>
  <div class="actions">
    <button class="act-btn primary" id="saveBtn">保 存 结 果</button>
    <button class="act-btn" onclick="location.reload()">重 新 测 试</button>
  </div>
  <div id="saveArea" class="hidden">
    <div class="save-hint">👇 长按图片保存，发小红书 / 朋友圈</div>
    <div class="save-preview"><img id="saveImg" /></div>
  </div>
  <div class="viral-section">
    <div class="viral-title">一 键 发 小 红 书</div>
    <div class="viral-sub">复制下方文案，直接粘贴发布</div>
    <div class="copy-box" id="copyBox"></div>
    <div class="viral-btns">
      <button class="v-btn primary" onclick="copyText()">复 制 文 案</button>
      <button class="v-btn" onclick="copyLink()">复 制 链 接 · 发 给 朋 友 测</button>
    </div>
  </div>
</div>

</div>
<script>
// ============================================================
//  题库 10题
// ============================================================
const TOTAL=10;
// Q1-Q8: 普通选择, Q9: 跨维度, Q10: 排序
const quiz=[
// Q1 身体事实 · 力/柔
{dim:'身 体 感 知',q:'忙了一整天，你的身体最先喊累的地方是——',o:[
{t:'脖子和肩膀，整个上半身都紧',d:[{d:'力',w:2}]},
{t:'腰背，感觉撑了一天的架子',d:[{d:'力',w:1}]},

{t:'说不上哪里，就是整个人"蔫"了',d:[{d:'柔',w:2}]}]},

{dim:'身 体 渴 望',q:'运动之后，你最享受的感觉是——',o:[

{dim:'身 体 本 能',q:'朋友突然拍了张你的照片，p完脸之后，你接下来最在意的是——',o:[

{dim:'运 动 性 格',q:'一种运动方式最容易让你放弃的原因是——',o:[

{dim:'身 体 理 想',q:'对你来说，理想的身体状态是——',o:[

let curQ=0;const answers={};let rankOrder=[];
function startQuiz(){document.getElementById('welcome').classList.add('hidden');document.getElementById('quizWrap').classList.remove('hidden');renderQuestion(0);}

function renderQuestion(idx){
  const card=document.getElementById('qCard');card.className='q-card enter';
  document.getElementById('qBarFill').style.width=(idx/TOTAL*100)+'%';
  document.getElementById('qNum').textContent=`${idx+1} / ${TOTAL}`;
  if(idx===9){renderRankQ(card);} else {renderNormalQ(idx,card);}
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{card.className='q-card';});});
}

function renderNormalQ(idx,card){
  const q=quiz[idx];
  card.innerHTML=`<div class="q-dim">${q.dim}</div><div class="q-text">${q.q}</div><div class="q-opts">${q.o.map((o,i)=>`<button class="q-opt" onclick="pickOpt(${idx},${i})"><span>${o.t}</span></button>`).join('')}</div>`;
}

function renderRankQ(card){
  rankOrder=[];
  card.innerHTML=`
    <div class="q-dim">训 练 愿 望</div>
    <div class="q-text">给你的身体愿望排个序<br>按重要程度依次点击 👇</div>
    <div class="rank-hint">点击 = 排序，再次点击 = 取消</div>
    <div class="rank-grid" id="rankGrid">${rankItems.map((r,i)=>`
      <button class="rank-item" data-idx="${i}" onclick="toggleRank(${i})">
        <div class="rank-badge" id="rb${i}"></div>
        <div class="rank-emoji">${r.emoji}</div>
        <div class="rank-label">${r.label}</div>
      </button>`).join('')}</div>
    <button class="rank-submit" id="rankSubmit" disabled onclick="submitRank()">确 认 排 序</button>`;
}

function toggleRank(idx){
  const pos=rankOrder.indexOf(idx);
  if(pos>=0){rankOrder.splice(pos,1);} else {rankOrder.push(idx);}
  // 更新UI
  rankItems.forEach((_,i)=>{
    const el=document.querySelector(`.rank-item[data-idx="${i}"]`);
    const badge=document.getElementById('rb'+i);
    const rpos=rankOrder.indexOf(i);
    if(rpos>=0){el.classList.add('ranked');badge.textContent=rpos+1;}
    else{el.classList.remove('ranked');badge.textContent='';}
  });
  document.getElementById('rankSubmit').disabled=rankOrder.length<3;
}

function submitRank(){
  document.getElementById('qBarFill').style.width='100%';
  setTimeout(showAnalyzing,400);
}

function pickOpt(qIdx,oIdx){
  const q=quiz[qIdx],o=q.o[oIdx];
  answers[qIdx]=o.d; // array of {d,w}
  document.querySelectorAll('.q-opt').forEach((el,i)=>el.classList.toggle('selected',i===oIdx));
  setTimeout(()=>{
    const card=document.getElementById('qCard');card.className='q-card exit';
    setTimeout(()=>{curQ=qIdx+1;renderQuestion(curQ);},350);
  },500);
}

function showAnalyzing(){
  document.getElementById('quizWrap').classList.add('hidden');document.getElementById('analyzing').classList.remove('hidden');
  const msgs=['正 在 感 知 你 的 能 量 ...','读 取 你 的 力 量 与 柔 韧 ...','匹 配 你 的 专 属 图 谱 ...','解 锁 你 的 隐 藏 天 赋 ...'];
  let i=0;const el=document.getElementById('anaText');
  const t=setInterval(()=>{i++;if(i<msgs.length){el.textContent=msgs[i];}else{clearInterval(t);showResult();}},1200);
}

function drawStarMap(canvas){
  const W=canvas.width=360,H=canvas.height=220,ctx=canvas.getContext('2d');
  const stars=[];for(let i=0;i<60;i++){stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.3,a:Math.random()*.4+.1,s:Math.random()*2+1});}
  const typeStars=[{x:80,y:40},{x:180,y:30},{x:280,y:45},{x:50,y:90},{x:140,y:75},{x:220,y:85},{x:310,y:80},{x:40,y:140},{x:130,y:150},{x:230,y:140},{x:300,y:145},{x:70,y:190},{x:160,y:185},{x:250,y:195},{x:330,y:175},{x:180,y:110}];
  const cx=W/2,cy=H/2;let frame=0;
  function draw(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{const f=Math.sin(frame*0.02*s.s+s.x)*0.3+0.7;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,169,110,${s.a*f})`;ctx.fill();});
    typeStars.forEach((s,i)=>{if(i<typeStars.length-1){ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(typeStars[i+1].x,typeStars[i+1].y);ctx.strokeStyle='rgba(200,169,110,0.06)';ctx.lineWidth=0.5;ctx.stroke();}ctx.beginPath();ctx.arc(s.x,s.y,1.5,0,Math.PI*2);ctx.fillStyle='rgba(200,169,110,0.25)';ctx.fill();});
    const glow=Math.sin(frame*0.03)*0.15+0.85;
    const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,50);grad.addColorStop(0,`rgba(200,169,110,${0.3*glow})`);grad.addColorStop(0.5,`rgba(200,169,110,${0.08*glow})`);grad.addColorStop(1,'rgba(200,169,110,0)');ctx.fillStyle=grad;ctx.fillRect(cx-50,cy-50,100,100);
    ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);ctx.fillStyle=`rgba(232,213,176,${glow})`;ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy,1.5,0,Math.PI*2);ctx.fillStyle='#FAF6EF';ctx.fill();
    frame++;requestAnimationFrame(draw);
  }
  draw();
}

// ============================================================
//  8轴雷达
// ============================================================
function makeRadar(result){
  const size=260,cx=size/2,cy=size/2,r=85,n=8;
  const traits=['力','觉','稳','修','柔','展','流','塑'];
  const pairIdx=[0,1,2,3,0,1,2,3];
  const isFirst=[true,true,true,true,false,false,false,false];
  const angles=traits.map((_,i)=>-Math.PI/2+i*(Math.PI*2/n));
  const vals=traits.map((_,i)=>{
    const pi=pairIdx[i],res=result[pi],first=dimNames[pi][0];
    if(isFirst[i]) return res.pick===first?res.pct/100:(100-res.pct)/100;
    else return res.pick!==first?res.pct/100:(100-res.pct)/100;
  });
  const gridLines=[0.33,0.66,1].map(s=>angles.map(a=>`${cx+Math.cos(a)*r*s},${cy+Math.sin(a)*r*s}`).join(' '));
  const axes8=angles.map(a=>`<line x1="${cx}" y1="${cy}" x2="${cx+Math.cos(a)*r}" y2="${cy+Math.sin(a)*r}" stroke="rgba(200,169,110,0.15)" stroke-width="0.5"/>`).join('');
  const grids=gridLines.map(pts=>`<polygon points="${pts}" fill="none" stroke="rgba(200,169,110,0.1)" stroke-width="0.5"/>`).join('');
  const dataPoints=vals.map((v,i)=>`${cx+Math.cos(angles[i])*r*v},${cy+Math.sin(angles[i])*r*v}`).join(' ');
  const dots=vals.map((v,i)=>v<0.4?'':`<circle cx="${cx+Math.cos(angles[i])*r*v}" cy="${cy+Math.sin(angles[i])*r*v}" r="3" fill="#C8A96E"/>`).join('');
  const lblSvg=traits.map((t,i)=>{
    const pi=pairIdx[i],res=result[pi],isPicked=res.pick===t;
    const dist=isPicked?r+24:r+20,lx=cx+Math.cos(angles[i])*dist,ly=cy+Math.sin(angles[i])*dist;
    const fill=isPicked?'#C8A96E':'rgba(140,126,106,0.45)',fsize=isPicked?'14':'11',fw=isPicked?'font-weight:400':'font-weight:300';
    return `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" fill="${fill}" font-size="${fsize}" font-family="Noto Serif SC,serif" letter-spacing="2" style="${fw}">${t}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${size} ${size}" class="radar-svg" xmlns="http://www.w3.org/2000/svg">${grids}${axes8}<polygon points="${dataPoints}" fill="rgba(200,169,110,0.12)" stroke="#C8A96E" stroke-width="1.5"/>${dots}${lblSvg}</svg>`;
}

    btn.textContent='保 存 结 果';btn.disabled=false;
  };
}

//  裂变
// ============================================================
function copyText(){
  const text=window._shareText||'';
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(()=>{const b=document.querySelectorAll('.v-btn')[0];b.textContent='已 复 制 ！ 去 发 小 红 书 吧';setTimeout(()=>{b.textContent='复 制 文 案';},2500);}).catch(()=>fallbackCopy(text));}else{fallbackCopy(text);}
}
function copyLink(){
  const url=window.location.href;
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(()=>{const b=document.querySelectorAll('.v-btn')[1];b.textContent='已 复 制 ！ 快 发 给 朋 友';setTimeout(()=>{b.textContent='复 制 链 接 · 发 给 朋 友 测';},2500);}).catch(()=>fallbackCopy(url));}else{fallbackCopy(url);}
}
function fallbackCopy(text){const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');alert('已复制！');}catch(e){alert('请手动复制');}document.body.removeChild(ta);}
</script>
